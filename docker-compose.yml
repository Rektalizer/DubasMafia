services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: dubquest
      POSTGRES_USER: dubquest
      POSTGRES_PASSWORD: dubquest
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dubquest -d dubquest"]
      interval: 5s
      timeout: 5s
      retries: 20

  bot:
    build: .
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
